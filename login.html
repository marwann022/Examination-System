<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExamHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@4.12.22/dist/full.min.css"
      rel="stylesheet"
    />
    <style>
      ::-webkit-scrollbar {
        display: none;
      }

      * {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  </head>

  <body class="min-h-screen">
    <div class="fixed top-0 left-0 right-0 bottom-0 w-full h-screen">
      <img
        src="/24770152_103.jpg"
        alt="Student studying at desk"
        class="hidden w-full h-full object-cover object-center lg:block"
      />
      <img
        src="/24770152_104.jpg"
        alt="Student studying at desk"
        class="w-full h-full object-cover object-center lg:hidden"
      />
    </div>

    <div
      class="fixed top-0 left-0 right-0 bottom-0 mx-24 lg:m-0 flex justify-start p-4 sm:p-6 lg:p-10"
    >
      <div
        class="w-[100%] lg:max-w-2xl bg-white rounded-3xl px-8 py-10 sm:px-10 sm:py-12"
      >
        <div class="flex items-center gap-4 mb-8">
          <div
            class="w-9 h-9 rounded-lg bg-[#494BF3] flex items-center justify-center"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-5 h-5 text-white"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
            </svg>
          </div>
          <span class="text-xl font-bold text-gray-800">ExamHub</span>
        </div>

        <div>
          <h2 class="text-3xl font-bold text-gray-900 mb-1">Welcome back</h2>
          <p class="text-sm text-gray-400 mb-8">
            Enter your credentials to access your account
          </p>

          <form id="login">
            <div class="form-control w-full mb-2">
              <label class="label pb-1">
                <span class="label-text text-gray-600 text-sm font-medium"
                  >Email Address</span
                >
              </label>
              <input
                type="email"
                id="Email"
                placeholder="jane.doe@example.com"
                class="input input-bordered w-full bg-gray-50 focus:bg-white focus:border-blue-500 focus:outline-none"
              />
              <label class="label pt-1">
                <span class="label-text-alt text-error" id="emailError"></span>
              </label>
            </div>

            <div class="form-control w-full mb-4">
              <label class="label pb-1">
                <span class="label-text text-gray-600 text-sm font-medium"
                  >Password</span
                >
              </label>
              <div class="flex gap-2">
                <input
                  type="password"
                  id="Password"
                  placeholder="Enter your password"
                  class="input input-bordered w-full bg-gray-50 focus:bg-white focus:border-blue-500 focus:outline-none"
                />
                <button
                  type="button"
                  id="togglePassword"
                  class="btn btn-square btn-ghost border border-gray-300 bg-gray-50 hover:bg-gray-100"
                >
                  <svg
                    id="eyeOffIcon"
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-5 h-5 text-gray-500"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path
                      d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"
                    />
                    <path
                      d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"
                    />
                    <line x1="1" y1="1" x2="23" y2="23" />
                    <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24" />
                  </svg>
                  <svg
                    id="eyeIcon"
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-5 h-5 text-gray-500 hidden"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                  </svg>
                </button>
              </div>
              <label class="label pt-1">
                <span
                  class="label-text-alt text-error"
                  id="passwordError"
                ></span>
              </label>
            </div>

            <div class="form-control mt-6 mb-4">
              <button
                type="submit"
                class="btn w-full bg-[#494BF3] hover:bg-blue-700 text-white border-none text-base font-semibold rounded-xl"
              >
                Login
              </button>
            </div>
          </form>

          <p class="text-center text-sm text-gray-500">
            Don't have an account?
            <a
              href="register.html"
              class="text-blue-600 font-semibold hover:underline"
              >Sign up</a
            >
          </p>
        </div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
